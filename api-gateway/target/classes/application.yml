spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://127.0.0.1:5500"
              - "http://localhost:5500"
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        # ================= AUTH SERVICE =================
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: oauth2-auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/oauth2/**

        - id: oauth2-login
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/login/oauth2/**

        # ✅ AUTH API DOCS (KEEP THIS)
        - id: auth-service-api-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/v3/api-docs/**
          filters:
            - RewritePath=/auth/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

        # ================= MEASUREMENT SERVICE =================
        - id: measurement-service
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/quantities/**

        # ✅ MEASUREMENT API DOCS (KEEP THIS)
        - id: measurement-service-api-docs
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/measurement/v3/api-docs/**
          filters:
            - RewritePath=/measurement/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

# ================= SWAGGER AGGREGATION =================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Measurement Service
        url: /measurement/v3/api-docs

server:
  port: 8080