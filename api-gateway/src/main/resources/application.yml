spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://127.0.0.1:5500"
              - "http://localhost:5500"
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        # Auth Service - API
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        # Auth Service - OAuth2
        - id: oauth2-auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/oauth2/**

        - id: oauth2-login
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/login/oauth2/**

        # Auth Service - Swagger UI
        - id: auth-service-swagger-ui
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/swagger-ui/**
          filters:
            - RewritePath=/auth/swagger-ui/(?<segment>.*), /swagger-ui/$\{segment}

        - id: auth-service-swagger-html
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/swagger-ui.html
          filters:
            - RewritePath=/auth/swagger-ui.html, /swagger-ui.html

        # Auth Service - OpenAPI Docs
        - id: auth-service-api-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/v3/api-docs/**
          filters:
            - RewritePath=/auth/v3/api-docs(?<segment>/?.*), /v3/api-docs$\{segment}

        # Measurement Service - API
        - id: measurement-service
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/quantities/**

        # Measurement Service - Swagger UI
        - id: measurement-service-swagger-ui
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/measurement/swagger-ui/**
          filters:
            - RewritePath=/measurement/swagger-ui/(?<segment>.*), /swagger-ui/$\{segment}

        - id: measurement-service-swagger-html
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/measurement/swagger-ui.html
          filters:
            - RewritePath=/measurement/swagger-ui.html, /swagger-ui.html

        # Measurement Service - OpenAPI Docs
        - id: measurement-service-api-docs
          uri: ${MEASUREMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/measurement/v3/api-docs/**
          filters:
            - RewritePath=/measurement/v3/api-docs(?<segment>/?.*), /v3/api-docs$\{segment}

server:
  port: 8080